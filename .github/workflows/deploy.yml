name: Deploy to Free Hosting via FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
      
    - name: 📁 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # The path to upload the files to on the server (often htdocs or public_html)
        server-dir: htdocs/ 
        # Don't delete files that are on the server but not in github (like config files we modify manually on the server)
        exclude: |
          **/.git*
          **/.git*/**
          .github/
          database.sql
          setup-*.php
          includes/config.php
